name: 🇵🇭 Philippine News Blog Auto-Generator

on:
  schedule:
    # Sun & Wed at 04:00 UTC = 12:00 PM Philippines time
    # 2 posts/week — covers Philippine political news
    - cron: '0 4 * * 0,3'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug output'
        required: false
        default: 'false'

jobs:
  generate-ph-news-blog:
    name: Research & Publish PH News Blog Post
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Pull latest main to avoid conflicts ─────────────────────────────
      - name: Pull latest commits from main
        run: |
          git fetch origin main
          git reset --hard origin/main

      # ── 3. Node.js ───────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 4. Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci --prefer-offline

      # ── 5. Generate PH news blog post ───────────────────────────────────────
      - name: Research & generate PH news blog post with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-ph-news-blog.mjs

      # ── 6. Commit & push ─────────────────────────────────────────────────────
      - name: Commit and push new PH news blog post
        run: |
          git config --global user.name  "smartly.sale Bot"
          git config --global user.email "bot@smartly.sale"

          git add src/data/blog-posts.json

          if git diff --staged --quiet; then
            echo "⚠️  No changes to commit (post may already exist)"
            exit 0
          fi

          TITLE=$(node -e "
            const data = JSON.parse(require('fs').readFileSync('src/data/blog-posts.json','utf8'));
            console.log(data[0]?.title ?? 'Philippine news blog post');
          ")

          git commit -m "🇵🇭 Blog: ${TITLE} [skip ci]"

          for i in 1 2 3; do
            git push && break
            echo "⚠️  Push failed (attempt $i/3), rebasing on latest and retrying..."
            git pull --rebase origin main
          done

          echo "✅ PH news blog post committed and pushed — Vercel will redeploy automatically"

      # ── 7. Submit to Google Indexing API ─────────────────────────────────────
      - name: Submit new post to Google (IndexNow + Indexing API)
        env:
          GOOGLE_INDEXING_SA_JSON: ${{ secrets.GOOGLE_INDEXING_SA_JSON }}
        run: |
          echo "⏳ Waiting 60s for Vercel to redeploy..."
          sleep 60
          node scripts/submit-to-google.mjs

      # ── 8. Re-check indexing status after 10 minutes ─────────────────────────
      - name: Re-check indexing status (10 min after submission)
        env:
          GOOGLE_INDEXING_SA_JSON: ${{ secrets.GOOGLE_INDEXING_SA_JSON }}
        run: |
          echo "⏳ Waiting 10 minutes for Google to process..."
          sleep 600
          node scripts/submit-to-google.mjs --check
