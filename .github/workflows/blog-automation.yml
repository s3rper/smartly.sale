name: 🎮 Gaming Blog Auto-Generator

on:
  schedule:
    # Mon, Wed, Fri at 02:00 UTC = 10:00 AM Philippines time
    # 3 posts/week — proven safe cadence, Google never flags this as spam
    - cron: '0 2 * * 1,3,5'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug output'
        required: false
        default: 'false'

jobs:
  generate-blog-post:
    name: Generate & Publish Blog Post
    runs-on: ubuntu-latest

    # Needs write permission to commit back to the repo
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use GITHUB_TOKEN so the push triggers Vercel redeploy
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Pull latest main to avoid conflicts ─────────────────────────────
      - name: Pull latest commits from main
        run: |
          git fetch origin main
          git reset --hard origin/main

      # ── 3. Node.js ───────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 4. Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci --prefer-offline

      # ── 5. Generate blog post ────────────────────────────────────────────────
      - name: Generate blog post with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-blog.mjs

      # ── 6. Commit & push ─────────────────────────────────────────────────────
      - name: Commit and push new blog post
        run: |
          git config --global user.name  "smartly.sale Bot"
          git config --global user.email "bot@smartly.sale"

          git add src/data/blog-posts.json

          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "⚠️  No changes to commit (post may already exist)"
            exit 0
          fi

          # Get post title from the new JSON entry for a descriptive commit
          TITLE=$(node -e "
            const data = JSON.parse(require('fs').readFileSync('src/data/blog-posts.json','utf8'));
            console.log(data[0]?.title ?? 'Gaming blog post');
          ")

          git commit -m "🎮 Blog: ${TITLE} [skip ci]"

          # Push with retry — if another workflow pushed between our fetch and now,
          # pull latest, rebase our commit on top, and retry
          for i in 1 2 3; do
            git push && break
            echo "⚠️  Push failed (attempt $i/3), rebasing on latest and retrying..."
            git pull --rebase origin main
          done

          echo "✅ Blog post committed and pushed — Vercel will redeploy automatically"

      # ── 7. Submit to Google Indexing API ─────────────────────────────────────
      - name: Submit new post to Google (IndexNow + Indexing API + status check)
        env:
          GOOGLE_INDEXING_SA_JSON: ${{ secrets.GOOGLE_INDEXING_SA_JSON }}
        run: |
          # Wait 60s for Vercel to finish deploying before pinging Google
          echo "⏳ Waiting 60s for Vercel to redeploy..."
          sleep 60
          node scripts/submit-to-google.mjs

      # ── 8. Re-check indexing status after 10 minutes ──────────────────────
      - name: Re-check indexing status (10 min after submission)
        env:
          GOOGLE_INDEXING_SA_JSON: ${{ secrets.GOOGLE_INDEXING_SA_JSON }}
        run: |
          echo "⏳ Waiting 10 minutes for Google to process crawl request..."
          sleep 600
          node scripts/submit-to-google.mjs --check
